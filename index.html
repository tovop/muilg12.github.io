document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

5b3cae606\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body { background: #f4f1e9; }\n  ul { margin: 0; padding: 0; list-style: none; }\n  @media print {\n    .noprint { display: none !important; }\n    .week-card { break-inside: avoid; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family:'Barlow',system-ui,sans-serif;color:#16241c;background:#f4f1e9;min-height:100vh\">\n\n  <!-- HERO -->\n  <header style=\"background:#2f6e4f;color:#f4f1e9;padding:48px 28px 40px;background-image:radial-gradient(circle at 88% -10%, rgba(167,211,180,0.28), transparent 42%)\">\n    <div style=\"max-width:1040px;margin:0 auto\">\n      <div style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.25);padding:6px 12px;border-radius:999px;font-weight:700;letter-spacing:0.14em;font-size:13px\">MYRA U-I-L · GUTTER 12 ÅR<\u002Fdiv>\n      <h1 style=\"font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(52px,11vw,116px);line-height:0.9;margin:18px 0 0;letter-spacing:0.01em;text-transform:uppercase\">Sommer-<br>trening<\u002Fh1>\n      <p style=\"font-size:clamp(17px,2.4vw,22px);max-width:620px;margin:18px 0 0;line-height:1.45;color:#dff0e4\">Hold deg sterk og kjapp i sommer! Tre korte økter i uka – gjerne sammen med en lagkamerat – så er du klar når sesongen sparker i gang igjen.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:30px\">\n        <div style=\"background:rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;min-width:120px\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:38px;line-height:1\">3<\u002Fdiv>\n          <div style=\"font-size:14px;letter-spacing:0.06em;color:#cfe6d6;text-transform:uppercase\">økter i uka<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;min-width:120px\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:38px;line-height:1\">7<\u002Fdiv>\n          <div style=\"font-size:14px;letter-spacing:0.06em;color:#cfe6d6;text-transform:uppercase\">uker (26–32)<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;min-width:120px\">\n          <div style=\"font-family:'Anton',sans-serif;font-size:38px;line-height:1\">21<\u002Fdiv>\n          <div style=\"font-size:14px;letter-spacing:0.06em;color:#cfe6d6;text-transform:uppercase\">økter totalt<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"max-width:1040px;margin:0 auto;padding:36px 28px 64px\">\n\n    <!-- SLIK FUNKER DET -->\n    <section style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px\">\n      <div style=\"background:#fff;border:2px solid #e7e2d6;border-radius:14px;padding:20px\">\n        <div style=\"font-family:'Anton',sans-serif;font-size:15px;color:#2f6e4f;letter-spacing:0.05em\">3 ØKTER I UKA<\u002Fdiv>\n        <p style=\"margin:8px 0 0;font-size:16px;line-height:1.5;color:#3c4a42\">Én rolig, én sprint og én intervall. Velg dagene som passer deg – bare spre dem litt utover uka.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:2px solid #e7e2d6;border-radius:14px;padding:20px\">\n        <div style=\"font-family:'Anton',sans-serif;font-size:15px;color:#2f6e4f;letter-spacing:0.05em\">HELST SAMMEN<\u002Fdiv>\n        <p style=\"margin:8px 0 0;font-size:16px;line-height:1.5;color:#3c4a42\">Alene går fint – men det er gøyere og lettere å gjennomføre med en lagkamerat eller venn.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:2px solid #e7e2d6;border-radius:14px;padding:20px\">\n        <div style=\"font-family:'Anton',sans-serif;font-size:15px;color:#2f6e4f;letter-spacing:0.05em\">HVER ØKT<\u002Fdiv>\n        <p style=\"margin:8px 0 0;font-size:16px;line-height:1.5;color:#3c4a42\">Start med 8–10 min lett oppvarming, så hoveddelen. Hold deg på gress eller grus – ikke hard asfalt.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- LEGEND -->\n    <section style=\"display:flex;flex-wrap:wrap;gap:12px;margin-top:24px\">\n      <div style=\"display:flex;align-items:flex-start;gap:10px;background:#fff;border:2px solid #e7e2d6;border-radius:12px;padding:12px 16px;flex:1 1 240px\">\n        <span style=\"width:14px;height:14px;border-radius:4px;background:#2f8f9d;margin-top:3px;flex:none\"><\u002Fspan>\n        <div><div style=\"font-weight:700;color:#1f5d66\">Rolig økt<\u002Fdiv><div style=\"font-size:14px;color:#5c6b62\">Prateempo – bygger motoren din.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:flex-start;gap:10px;background:#fff;border:2px solid #e7e2d6;border-radius:12px;padding:12px 16px;flex:1 1 240px\">\n        <span style=\"width:14px;height:14px;border-radius:4px;background:#e8973a;margin-top:3px;flex:none\"><\u002Fspan>\n        <div><div style=\"font-weight:700;color:#a8651a\">Sprint økt<\u002Fdiv><div style=\"font-size:14px;color:#5c6b62\">Full fart, full pause – gir deg toppfart.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:flex-start;gap:10px;background:#fff;border:2px solid #e7e2d6;border-radius:12px;padding:12px 16px;flex:1 1 240px\">\n        <span style=\"width:14px;height:14px;border-radius:4px;background:#d9543b;margin-top:3px;flex:none\"><\u002Fspan>\n        <div><div style=\"font-weight:700;color:#a63620\">Intervalløkt<\u002Fdiv><div style=\"font-size:14px;color:#5c6b62\">Hardt i dragene, rolig i pausene.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- PROGRESS -->\n    <section class=\"noprint\" style=\"margin-top:28px;background:#16241c;color:#f4f1e9;border-radius:16px;padding:22px 24px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n        <div>\n          <div style=\"font-family:'Anton',sans-serif;font-size:22px;letter-spacing:0.03em\">DIN SOMMER<\u002Fdiv>\n          <div style=\"font-size:15px;color:#b9c7bf\">Trykk på en økt når du har gjennomført den.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Anton',sans-serif;font-size:40px;line-height:1;color:#a7d3b4\">{{ completed }}<span style=\"font-size:22px;color:#8aa394\"> / {{ total }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px;height:14px;background:rgba(255,255,255,0.12);border-radius:999px;overflow:hidden\">\n        <div style=\"{{ barStyle }}\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- WEEKS -->\n    <section style=\"margin-top:8px\">\n      <sc-for list=\"{{ weeks }}\" as=\"w\" hint-placeholder-count=\"7\">\n        <div class=\"week-card\" style=\"margin-top:30px\">\n          <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #e2ddd0\">\n            <div style=\"font-family:'Anton',sans-serif;font-size:46px;line-height:0.9;color:#2f6e4f\">{{ w.numStr }}<\u002Fdiv>\n            <div>\n              <div style=\"font-family:'Anton',sans-serif;font-size:14px;letter-spacing:0.12em;color:#9aa89f\">UKE<\u002Fdiv>\n              <div style=\"font-weight:700;font-size:20px;color:#16241c\">{{ w.focus }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:16px\">\n            <sc-for list=\"{{ w.sessions }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <div style=\"{{ s.cardStyle }}\" onclick=\"{{ s.toggle }}\">\n                <div style=\"{{ s.stripeStyle }}\"><\u002Fdiv>\n                <div style=\"padding:16px 16px 18px;display:flex;flex-direction:column;gap:10px\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px\">\n                    <span style=\"{{ s.badgeStyle }}\">{{ s.typeLabel }}<\u002Fspan>\n                    <span style=\"{{ s.checkStyle }}\">{{ s.checkMark }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:8px\">\n                    <div style=\"font-weight:700;font-size:19px;color:#16241c\">{{ s.title }}<\u002Fdiv>\n                    <div style=\"font-family:'Anton',sans-serif;font-size:18px;color:#2f6e4f;white-space:nowrap\">{{ s.duration }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <ul style=\"display:flex;flex-direction:column;gap:6px\">\n                    <sc-for list=\"{{ s.lines }}\" as=\"line\" hint-placeholder-count=\"2\">\n                      <li style=\"position:relative;padding-left:18px;font-size:15px;line-height:1.45;color:#3c4a42\"><span style=\"position:absolute;left:0;top:8px;width:7px;height:7px;border-radius:2px;background:#cfd8d0\"><\u002Fspan>{{ line.text }}<\u002Fli>\n                    <\u002Fsc-for>\n                  <\u002Ful>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fsection>\n\n    <!-- FOTBALLEK -->\n    <section style=\"margin-top:44px;background:#eef4ec;border:2px solid #d6e4d8;border-radius:16px;padding:26px 24px\">\n      <div style=\"font-family:'Anton',sans-serif;font-size:24px;color:#2f6e4f;letter-spacing:0.02em\">LYST PÅ LITT BALL?<\u002Fdiv>\n      <p style=\"margin:8px 0 16px;font-size:16px;color:#3c4a42;max-width:680px;line-height:1.5\">Helt frivillig bonus! Har du lyst, kan du krydre øktene med litt fotballek. Det teller ikke som en av de tre øktene – men det er gøy, og touchen holdes ved like.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n        <span style=\"background:#fff;border:1.5px solid #cdddd0;border-radius:999px;padding:8px 15px;font-weight:600;font-size:15px;color:#1f5d4a\">Jonglering – slå din rekord<\u002Fspan>\n        <span style=\"background:#fff;border:1.5px solid #cdddd0;border-radius:999px;padding:8px 15px;font-weight:600;font-size:15px;color:#1f5d4a\">Panna / 1 mot 1<\u002Fspan>\n        <span style=\"background:#fff;border:1.5px solid #cdddd0;border-radius:999px;padding:8px 15px;font-weight:600;font-size:15px;color:#1f5d4a\">Skuddkonkurranse<\u002Fspan>\n        <span style=\"background:#fff;border:1.5px solid #cdddd0;border-radius:999px;padding:8px 15px;font-weight:600;font-size:15px;color:#1f5d4a\">Teknikkløype<\u002Fspan>\n        <span style=\"background:#fff;border:1.5px solid #cdddd0;border-radius:999px;padding:8px 15px;font-weight:600;font-size:15px;color:#1f5d4a\">Sisten med ball<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TIPS -->\n    <section style=\"margin-top:30px\">\n      <div style=\"font-family:'Anton',sans-serif;font-size:22px;color:#16241c;margin-bottom:14px\">HUSKEREGLER<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px\">\n        <div style=\"background:#fff;border:2px solid #e7e2d6;border-radius:12px;padding:16px;font-size:15px;line-height:1.45;color:#3c4a42\"><strong style=\"color:#16241c\">Varm alltid opp.<\u002Fstrong> 8–10 min lett jogg og litt bevegelse før du gir gass.<\u002Fdiv>\n        <div style=\"background:#fff;border:2px solid #e7e2d6;border-radius:12px;padding:16px;font-size:15px;line-height:1.45;color:#3c4a42\"><strong style=\"color:#16241c\">Drikk vann.<\u002Fstrong> Spesielt på varme sommerdager – ha med flaske.<\u002Fdiv>\n        <div style=\"background:#fff;border:2px solid #e7e2d6;border-radius:12px;padding:16px;font-size:15px;line-height:1.45;color:#3c4a42\"><strong style=\"color:#16241c\">Gode joggesko.<\u002Fstrong> Tren på gress eller grus, ikke fotballsko på hard asfalt.<\u002Fdiv>\n        <div style=\"background:#fff;border:2px solid #e7e2d6;border-radius:12px;padding:16px;font-size:15px;line-height:1.45;color:#3c4a42\"><strong style=\"color:#16241c\">Vondt? Ta pause.<\u002Fstrong> Litt sliten er bra – skikkelig vondt er stopp-signal.<\u002Fdiv>\n        <div style=\"background:#fff;border:2px solid #e7e2d6;border-radius:12px;padding:16px;font-size:15px;line-height:1.45;color:#3c4a42\"><strong style=\"color:#16241c\">Ha det gøy.<\u002Fstrong> Ta med en venn, sett på musikk – det viktigste er å være i bevegelse.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer style=\"margin-top:40px;text-align:center;padding-top:24px;border-top:2px solid #e2ddd0\">\n      <div style=\"font-family:'Anton',sans-serif;font-size:26px;color:#2f6e4f\">VI SEES STERKE TIL HØSTEN!<\u002Fdiv>\n      <div style=\"font-size:15px;color:#5c6b62;margin-top:6px\">Heia laget – trenerteamet Myra U-I-L G12<\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1040}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let done = {};\n    try { done = JSON.parse(localStorage.getItem('muil_sommer_done') || '{}') || {}; } catch (e) {}\n    this.state = { done };\n  }\n\n  toggle(id) {\n    this.setState(s => {\n      const done = Object.assign({}, s.done, { [id]: !s.done[id] });\n      try { localStorage.setItem('muil_sommer_done', JSON.stringify(done)); } catch (e) {}\n      return { done };\n    });\n  }\n\n  renderVals() {\n    const types = {\n      rolig:     { label: 'ROLIG ØKT',   color: '#2f8f9d' },\n      sprint:    { label: 'SPRINT ØKT',  color: '#e8973a' },\n      intervall: { label: 'INTERVALLØKT', color: '#d9543b' }\n    };\n\n    const raw = [\n      { num: 1, focus: 'Komme i gang', sessions: [\n        { type: 'rolig',     title: 'Rolig start',  duration: '20 min', lines: ['Jogg, sykkel eller svøm i prateempo', 'Avslutt med litt lett tøying'] },\n        { type: 'sprint',    title: 'Korte spurter', duration: '6 × 30 m', lines: ['Gå rolig tilbake som pause', 'Hold deg på gress eller grus'] },\n        { type: 'intervall', title: 'Første drag',  duration: '4 × 2 min', lines: ['Hardt i 2 min, gå rolig i 2 min', 'Sykkel funker like bra som løping'] }\n      ]},\n      { num: 2, focus: 'Bygge på', sessions: [\n        { type: 'rolig',     title: 'Litt lengre',  duration: '25 min', lines: ['Jevnt og rolig hele veien', 'Ta gjerne med en venn'] },\n        { type: 'sprint',    title: 'Full fart',    duration: '6 × 40 m', lines: ['Gi alt fra første steg', 'Full pause mellom hvert drag'] },\n        { type: 'intervall', title: 'Ett til',      duration: '5 × 2 min', lines: ['Ett drag mer enn forrige uke', 'Lik fart på alle dragene'] }\n      ]},\n      { num: 3, focus: 'Mer fart', sessions: [\n        { type: 'rolig',     title: 'Finn turen',   duration: '30 min', lines: ['Velg et fint turområde', 'Rolig og jevnt tempo'] },\n        { type: 'sprint',    title: 'Flytende fart', duration: '8 × 30 m + 2 × 20 m', lines: ['Ta full fart de siste metrene', 'Slapp i skuldrene'] },\n        { type: 'intervall', title: 'Lengre drag',  duration: '4 × 3 min', lines: ['Nå varer dragene lenger', 'Pust dypt i pausene'] }\n      ]},\n      { num: 4, focus: 'Lett uke – lad opp', sessions: [\n        { type: 'rolig',     title: 'Lett + stigning', duration: '25 min', lines: ['Roligere uke for å lade', 'Avslutt med 4 stigningsløp (øk farten over 60 m)'] },\n        { type: 'sprint',    title: 'Kvalitet',     duration: '6 × 40 m', lines: ['Færre drag – full kvalitet', 'Kjenn at du er kvikk'] },\n        { type: 'intervall', title: 'Hold igjen',   duration: '5 × 2 min', lines: ['Ikke gi helt alt denne uka', 'Lytt til kroppen'] }\n      ]},\n      { num: 5, focus: 'Ny topp', sessions: [\n        { type: 'rolig',     title: 'Lengste rolige', duration: '35 min', lines: ['Lengste rolige økt så langt', 'Variert terreng er gøy'] },\n        { type: 'sprint',    title: 'Reaksjon',     duration: '8 × 40 m', lines: ['Start på et signal fra en venn', 'Eksploder de første stegene'] },\n        { type: 'intervall', title: 'Sterk nå',     duration: '5 × 3 min', lines: ['Tøff økt – du tåler den nå', 'Jevn, hard fart'] }\n      ]},\n      { num: 6, focus: 'Toppuke', sessions: [\n        { type: 'rolig',     title: 'Ukas lengste', duration: '40 min', lines: ['Kos deg ute', 'Gjerne en tur med laget'] },\n        { type: 'sprint',    title: 'Mange drag',   duration: '10 × 30 m + 4 × 20 m', lines: ['Hold farten oppe hele veien', 'Hvil godt mellom hvert drag'] },\n        { type: 'intervall', title: 'Hardest',      duration: '6 × 3 min', lines: ['Sommerens hardeste intervalløkt!', 'Gi alt i hvert drag'] }\n      ]},\n      { num: 7, focus: 'Klar for sesong', sessions: [\n        { type: 'rolig',     title: 'Trapp ned',    duration: '30 min', lines: ['Spar litt krefter', 'Lett og deilig'] },\n        { type: 'sprint',    title: 'Spenstig',     duration: '6 × 30 m', lines: ['Sprek og rask', 'Føl deg klar før første trening'] },\n        { type: 'intervall', title: 'Kjapt',        duration: '4 × 2 min', lines: ['Korte, kjappe drag', 'Avslutt sommeren på topp'] }\n      ]}\n    ];\n\n    const cardBase = {\n      background: '#fff', borderRadius: '14px', overflow: 'hidden',\n      cursor: 'pointer', boxShadow: '0 1px 2px rgba(0,0,0,0.03)',\n      transition: 'border-color .15s, opacity .15s', userSelect: 'none'\n    };\n\n    const weeks = raw.map(w => ({\n      numStr: String(w.num),\n      focus: w.focus,\n      sessions: w.sessions.map(s => {\n        const t = types[s.type];\n        const id = 'u' + w.num + '-' + s.type;\n        const checked = !!this.state.done[id];\n        return {\n          id,\n          typeLabel: t.label,\n          title: s.title,\n          duration: s.duration,\n          lines: s.lines.map(text => ({ text })),\n          checkMark: checked ? '✓' : '',\n          toggle: () => this.toggle(id),\n          cardStyle: Object.assign({}, cardBase, {\n            border: '2px solid ' + (checked ? '#2f6e4f' : '#e7e2d6'),\n            opacity: checked ? 0.62 : 1\n          }),\n          stripeStyle: { height: '7px', background: t.color },\n          badgeStyle: {\n            display: 'inline-block', fontFamily: \"'Anton', sans-serif\",\n            letterSpacing: '0.05em', fontSize: '12px', color: '#fff',\n            background: t.color, padding: '4px 10px', borderRadius: '6px'\n          },\n          checkStyle: {\n            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',\n            width: '26px', height: '26px', borderRadius: '999px',\n            fontSize: '15px', fontWeight: 700, lineHeight: 1, flex: 'none',\n            color: checked ? '#fff' : 'transparent',\n            background: checked ? '#2f6e4f' : '#fff',\n            border: '2px solid ' + (checked ? '#2f6e4f' : '#cdd6cd')\n          }\n        };\n      })\n    }));\n\n    const total = raw.reduce((n, w) => n + w.sessions.length, 0);\n    const completed = Object.values(this.state.done).filter(Boolean).length;\n    const pct = total ? Math.round(completed / total * 100) : 0;\n\n    return {\n      weeks,\n      total,\n      completed,\n      barStyle: {\n        width: pct + '%', height: '100%',\n        background: 'linear-gradient(90deg,#5a9e74,#a7d3b4)',\n        borderRadius: '999px', transition: 'width .25s ease'\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
